<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Time Counter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#74b9ff,#6c5ce7);
}

.container{
    width:480px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

h1{
    text-align:center;
    color:#2d3436;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#636e72;
    margin-bottom:30px;
    font-size:15px;
}

label{
    font-weight:600;
    color:#2d3436;
}

input{
    width:100%;
    margin-top:10px;
    margin-bottom:22px;
    padding:14px;
    border-radius:10px;
    border:1px solid #dfe6e9;
    font-size:16px;
    transition:.25s;
}

input:focus{
    outline:none;
    border-color:#6c5ce7;
    box-shadow:0 0 8px rgba(108,92,231,.25);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#6c5ce7;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
    transition:.25s;
}

button:hover{
    background:#5b4bc4;
    transform:translateY(-2px);
}

.result{
    margin-top:28px;
}

.card{
    background:#f8f9ff;
    border-left:5px solid #6c5ce7;
    border-radius:10px;
    padding:15px;
    margin-bottom:18px;
}

.card h3{
    color:#6c5ce7;
    margin-bottom:8px;
    font-size:17px;
}

.card p{
    font-size:18px;
    color:#2d3436;
}

.error{
    color:#d63031;
    font-weight:bold;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<h1>⏳ Time Counter</h1>
<p class="subtitle">
Calculate the time remaining until a future date and its equivalent past time.
</p>

<label>Select a future date and time</label>

<input type="datetime-local" id="futureTime">

<button onclick="calculate()">Calculate</button>

<div id="output" class="result"></div>

</div>

<script>

function formatDuration(ms){

    let totalMinutes=Math.floor(ms/60000);

    const days=Math.floor(totalMinutes/(24*60));
    totalMinutes%=24*60;

    const hours=Math.floor(totalMinutes/60);
    const minutes=totalMinutes%60;

    return `${days} day(s), ${hours} hour(s), ${minutes} minute(s)`;
}

function formatDate(date){

    const pad=n=>String(n).padStart(2,"0");

    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}
    ${pad(date.getHours())}:${pad(date.getMinutes())}`;
}

function calculate(){

    const input=document.getElementById("futureTime").value;
    const output=document.getElementById("output");

    if(!input){
        output.innerHTML="<p class='error'>Please select a date and time.</p>";
        return;
    }

    const future=new Date(input);
    const now=new Date();

    const difference=future-now;

    if(difference<0){
        output.innerHTML="<p class='error'>The selected time is not in the future.</p>";
        return;
    }

    const minutes=Math.floor(difference/60000);

    const past=new Date(now.getTime()-minutes*60000);

    output.innerHTML=`
        <div class="card">
            <h3>Time Remaining</h3>
            <p>${formatDuration(difference)}</p>
        </div>

        <div class="card">
            <h3>Equivalent Past Time</h3>
            <p>${formatDate(past)}</p>
        </div>
    `;
}

</script>

</body>
</html>
