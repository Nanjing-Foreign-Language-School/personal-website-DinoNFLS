<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Time Counter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

body{
    background:#eef2f7;
    color:#222;
    padding:20px;
}

.container{
    max-width:900px;
    margin:0 auto;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:2.2rem;
    margin-bottom:8px;
}

.header p{
    color:#666;
    line-height:1.5;
}

.main-card{
    background:white;
    border-radius:18px;
    padding:28px;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
}

label{
    display:block;
    font-weight:600;
    margin-bottom:10px;
}

input{
    display:block;
    width:100%;
    max-width:100%;
    min-width:0;          /* Fixes iOS Safari overflow */
    appearance:none;
    -webkit-appearance:none;
    box-sizing:border-box;

    padding:15px;
    height:56px;
    font-size:16px;
    border:1px solid #d6dbe5;
    border-radius:12px;
    background:#fafbfd;
    transition:.2s;
}

input:focus{
    outline:none;
    border-color:#4f7cff;
    background:white;
    box-shadow:0 0 0 4px rgba(79,124,255,.15);
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#4f7cff;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#3f6ef2;
}

button:active{
    transform:scale(.98);
}

.results{
    margin-top:30px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.result-card{
    background:#f8faff;
    border:1px solid #e3e8f2;
    border-radius:14px;
    padding:20px;
}

.result-card h3{
    color:#4f7cff;
    margin-bottom:12px;
    font-size:18px;
}

.result-card p{
    font-size:18px;
    line-height:1.6;
    word-break:break-word;
}

.error{
    margin-top:25px;
    padding:16px;
    background:#ffe9e9;
    color:#d63031;
    border-radius:12px;
    text-align:center;
    font-weight:600;
}

@media (max-width:700px){

    body{
        padding:14px;
    }

    .main-card{
        padding:20px;
    }

    .header h1{
        font-size:1.8rem;
    }

    .results{
        grid-template-columns:1fr;
    }

    .result-card p{
        font-size:17px;
    }
}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        <h1>⏳ Time Counter</h1>
        <p>
            Calculate the time remaining until a future date and its equivalent past time.
        </p>
    </div>

    <div class="main-card">

        <label for="futureTime">Select a future date and time</label>

        <input type="datetime-local" id="futureTime">

        <button onclick="calculate()">Calculate</button>

        <div id="output"></div>

    </div>

</div>

<script>

function formatDuration(ms){

    let totalMinutes=Math.floor(ms/60000);

    const days=Math.floor(totalMinutes/(24*60));
    totalMinutes%=24*60;

    const hours=Math.floor(totalMinutes/60);
    const minutes=totalMinutes%60;

    return `${days} day(s), ${hours} hour(s), ${minutes} minute(s)`;
}

function formatDate(date){

    const pad=n=>String(n).padStart(2,"0");

    return `${date.getFullYear()}-${pad(date.getMonth()+1)}-${pad(date.getDate())}
${pad(date.getHours())}:${pad(date.getMinutes())}`;

}

function calculate(){

    const input=document.getElementById("futureTime").value;
    const output=document.getElementById("output");

    if(!input){
        output.innerHTML=`<div class="error">
            Please select a date and time.
        </div>`;
        return;
    }

    const future=new Date(input);
    const now=new Date();

    const difference=future-now;

    if(difference<0){
        output.innerHTML=`<div class="error">
            The selected time is not in the future.
        </div>`;
        return;
    }

    const minutes=Math.floor(difference/60000);

    const past=new Date(now.getTime()-minutes*60000);

    output.innerHTML=`
        <div class="results">

            <div class="result-card">
                <h3>Time Remaining</h3>
                <p>${formatDuration(difference)}</p>
            </div>

            <div class="result-card">
                <h3>Equivalent Past Time</h3>
                <p>${formatDate(past)}</p>
            </div>

        </div>
    `;
}

</script>

</body>
</html>
